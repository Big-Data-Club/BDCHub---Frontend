name: Frontend CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED: "false"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "ci-placeholder"
      NEXTAUTH_URL: "https://bdc.hpcc.vn"
      NEXTAUTH_SECRET: "ci-build-secret-not-for-production"
      AI_SERVICE_SECRET: "ci-build-secret-not-for-production"
      BACKEND_URL: "http://localhost:8080"
      LMS_API_URL: "http://localhost:8081"
      AI_SERVICE_URL: "http://localhost:8000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check linting
        run: npm run lint

      - name: Build project (Test build)
        run: npm run build
