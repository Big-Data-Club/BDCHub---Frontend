name: Publish Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: check-creds
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}
        run: |
          if [ -n "$DOCKER_USER" ] && [ -n "$DOCKER_PASS" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
            echo "DOCKER_USER=$DOCKER_USER" >> $GITHUB_ENV
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "::warning::Docker Hub credentials (DOCKER_USERNAME / DOCKER_PASSWORD) are not set in GitHub Repository Secrets. Skipping login and push."
          fi

      - name: Log in to Docker Hub
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/bdc-frontend:latest
            ${{ env.DOCKER_USER }}/bdc-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID || vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID || '' }}
            NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED=${{ vars.NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED || 'true' }}
            BACKEND_URL=${{ secrets.BACKEND_URL || vars.BACKEND_URL || 'http://backend:8080' }}
            LMS_API_URL=${{ secrets.LMS_API_URL || vars.LMS_API_URL || 'http://lms-backend:8081' }}
            AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL || vars.AI_SERVICE_URL || 'http://ai-service:8000' }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || vars.NEXTAUTH_URL || 'https://bdc.hpcc.vn' }}
            AI_SERVICE_SECRET=${{ secrets.AI_SERVICE_SECRET }}