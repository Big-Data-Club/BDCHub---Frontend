name: Publish Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bdc-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/bdc-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED=${{ vars.NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED || 'true' }}
            BACKEND_URL=${{ secrets.BACKEND_URL || 'http://backend:8080' }}
            LMS_API_URL=${{ secrets.LMS_API_URL || 'http://lms-backend:8081' }}
            AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL || 'http://ai-service:8000' }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || 'https://bdc.hpcc.vn' }}
            AI_SERVICE_SECRET=${{ secrets.AI_SERVICE_SECRET }}